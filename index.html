// ── Period helpers ────────────────────────────────────────────────────────────

function getPeriodDates(periodChoice) {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  // Data is uploaded monthly — treat end of last full month as the safe cutoff
  const cutoff = new Date(y, m, 0); // last day of previous month
  const cy = cutoff.getFullYear(), cm = cutoff.getMonth(); // cm is 0-based

  const fmt = (yr, mo, day) => `${yr}${String(mo+1).padStart(2,'0')}${String(day).padStart(2,'0')}`;
  const monthName = (yr, mo) => new Date(yr, mo, 1).toLocaleString('nl-NL', {month:'long'});
  const lastDayOf = (yr, mo) => new Date(yr, mo+1, 0).getDate();

  if (periodChoice === "b") {
    // Previous full month = most recent complete month in data
    return {
      start: fmt(cy, cm, 1),
      end:   fmt(cy, cm, lastDayOf(cy, cm)),
      label: `${monthName(cy, cm)} ${cy}`
    };
  }

  if (periodChoice === "c") {
    // This year up to end of last full month
    return {
      start: fmt(cy, 0, 1),
      end:   fmt(cy, cm, lastDayOf(cy, cm)),
      label: `${cy} (t/m ${monthName(cy, cm)})`
    };
  }
  // "d" = previous full year
  const py = cy - 1;
  return { start:`${py}0101`, end:`${py}1231`, label:`${py} (volledig jaar)` };
}

// ── Tilt factors: tilted-plane irradiance / horizontal KNMI irradiance ────────
// For NL (~52°N), annual estimate using isotropic sky model
// Rows = azimuth, Cols = tilt angle in degrees {0,15,30,40,50,60}
const TILT_FACTORS = {
  "Z":  {0:1.00, 15:1.09, 30:1.15, 40:1.17, 50:1.14, 60:1.08},
  "ZW": {0:1.00, 15:1.07, 30:1.12, 40:1.13, 50:1.10, 60:1.04},
  "ZO": {0:1.00, 15:1.07, 30:1.12, 40:1.13, 50:1.10, 60:1.04},
  "W":  {0:1.00, 15:1.02, 30:1.01, 40:0.98, 50:0.93, 60:0.86},
  "O":  {0:1.00, 15:1.02, 30:1.01, 40:0.98, 50:0.93, 60:0.86},
  "NW": {0:1.00, 15:0.94, 30:0.86, 40:0.80, 50:0.73, 60:0.65},
  "NO": {0:1.00, 15:0.94, 30:0.86, 40:0.80, 50:0.73, 60:0.65},
  "N":  {0:1.00, 15:0.87, 30:0.74, 40:0.66, 50:0.58, 60:0.51},
};

// Interpolate tilt factor for a given orientation + tilt angle
function getTiltFactor(orientation, tiltDeg) {
  const row = TILT_FACTORS[orientation] || TILT_FACTORS["Z"];
  const breaks = [0, 15, 30, 40, 50, 60];
  const t = Math.max(0, Math.min(60, tiltDeg));
  // Find surrounding breakpoints and interpolate
  for (let i = 0; i < breaks.length - 1; i++) {
    if (t <= breaks[i+1]) {
      const frac = (t - breaks[i]) / (breaks[i+1] - breaks[i]);
      return row[breaks[i]] + frac * (row[breaks[i+1]] - row[breaks[i]]);
    }
  }
  return row[60];
}

// ── Haversine distance (km) ───────────────────────────────────────────────────
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371, toR = d => d * Math.PI / 180;
  const dLat = toR(lat2-lat1), dLon = toR(lon2-lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── Geocode place → lat/lon via Nominatim proxy ───────────────────────────────
async function geocodePlace(place) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(place + ", Nederland")}&format=json&limit=1&countrycodes=nl`;
  // Try with and without CORS proxy
  for (const makeUrl of [(u)=>u, (u)=>`https://corsproxy.io/?${encodeURIComponent(u)}`]) {
    try {
      const r = await fetch(makeUrl(url), {headers:{'Accept':'application/json'}});
      if (!r.ok) continue;
      const d = await r.json();
      if (d.length) return {lat: parseFloat(d[0].lat), lon: parseFloat(d[0].lon)};
    } catch(e) { continue; }
  }
  // Fallback: use De Bilt as center of NL
  return null;
}

// ── Find nearest KNMI station (with data for given period) ───────────────────
function findNearestStation(lat, lon, startStr, endStr) {
  // Rank all stations by distance, prefer those with data for the period
  const ranked = KNMI_STATIONS.map(s => ({
    station: s,
    dist: haversine(lat, lon, s.lat, s.lon),
    hasData: startStr ? sumRadiation(s.id, startStr, endStr).available : !!KNMI_DATA[s.id],
  })).sort((a, b) => a.dist - b.dist);

  // First: nearest station WITH data
  const withData = ranked.find(r => r.hasData);
  if (withData) return { station: withData.station, dist: withData.dist };

  // Fallback: nearest station regardless
  return { station: ranked[0].station, dist: ranked[0].dist };
}

// ── Sum Q values from inline data for a date range ────────────────────────────
function sumRadiation(stationId, startStr, endStr) {
  const rec = KNMI_DATA[stationId];
  if (!rec) return {totalQ:0, count:0, available:false};
  const dataStart = new Date(rec.s.slice(0,4), rec.s.slice(4,6)-1, rec.s.slice(6,8));
  const start = new Date(startStr.slice(0,4), startStr.slice(4,6)-1, startStr.slice(6,8));
  const end   = new Date(endStr.slice(0,4),   endStr.slice(4,6)-1,   endStr.slice(6,8));
  let totalQ = 0, count = 0;
  let cur = new Date(start);
  while (cur <= end) {
    const dayIdx = Math.round((cur - dataStart) / 86400000);
    if (dayIdx >= 0 && dayIdx < rec.q.length && rec.q[dayIdx] !== null) {
      totalQ += rec.q[dayIdx];
      count++;
    }
    cur.setDate(cur.getDate() + 1);
  }
  return {totalQ, count, available: count > 0};
}

// ── Rating helper ─────────────────────────────────────────────────────────────
function getRating(pr) {
  if (pr < 75)  return {rating:"Niet oké",      ratingIcon:"⚠️", ratingColor:"#e53935"};
  if (pr < 80)  return {rating:"Oké",           ratingIcon:"🔆", ratingColor:"#fb8c00"};
  if (pr < 90)  return {rating:"Goed",           ratingIcon:"✅", ratingColor:"#43a047"};
  if (pr <= 95) return {rating:"Zeer goed",      ratingIcon:"🌟", ratingColor:"#00897b"};
  return         {rating:"Controleer gegevens",  ratingIcon:"🔍", ratingColor:"#8e24aa"};
}

function getAdvice(pr, orientLabel, tiltDeg, systemAge) {
  // Expected degradation: ~0.5% per year (industry average mono/poly)
  const degradation = Math.min(systemAge * 0.6, 20); // cap at 20%
  const ageCorrectedRef = 80 * (1 - degradation / 100); // expected PR after degradation
  const ageNote = systemAge > 0
    ? ` Na ${systemAge} jaar verwachte degradatie is ~${degradation.toFixed(0)}% — referentiewaarde voor dit systeem is ~${ageCorrectedRef.toFixed(0)}%.`
    : "";
  const ageLabel = systemAge === 0 ? "nieuw" : `${systemAge} jaar oud`;

  if (pr < 75) {
    if (systemAge >= 15 && pr >= 70) return `PR ${pr.toFixed(1)}% is laag maar voor een ${ageLabel} systeem nog verklaarbaar door panelveroudering (verwachte degradatie ~${degradation.toFixed(0)}%). Overweeg toch een inspectie op schaduw of vervuiling.`;
    return `De prestatie (PR ${pr.toFixed(1)}%) is beduidend lager dan verwacht voor een ${ageLabel} ${orientLabel}-gericht systeem op ${tiltDeg}°. Controleer op schaduw, vervuiling of een technisch defect. Een inspectie is aan te raden.`;
  }
  if (pr < 80) {
    if (systemAge >= 10) return `PR ${pr.toFixed(1)}% is normaal voor een ${ageLabel} systeem.${ageNote} Geen directe actie vereist.`;
    return `De prestatie (PR ${pr.toFixed(1)}%) is iets onder de norm voor een ${ageLabel} systeem. Controleer op gedeeltelijke schaduw of lichte vervuiling.`;
  }
  if (pr < 90) {
    if (systemAge >= 15) return `Uitstekende prestatie (PR ${pr.toFixed(1)}%) voor een ${ageLabel} systeem!${ageNote} De panelen presteren beduidend beter dan de verwachte degradatie.`;
    return `Het systeem presteert goed (PR ${pr.toFixed(1)}%) — binnen de verwachte marge voor een ${ageLabel} ${tiltDeg}° ${orientLabel}-gericht systeem. Geen actie vereist.`;
  }
  if (pr <= 95) {
    if (systemAge >= 10) return `Indrukwekkende prestatie (PR ${pr.toFixed(1)}%) voor een ${ageLabel} systeem!${ageNote} De panelen presteren ver boven verwachting.`;
    return `Uitstekende prestatie (PR ${pr.toFixed(1)}%)! Het systeem functioneert optimaal voor een ${ageLabel} ${tiltDeg}° ${orientLabel}-gericht systeem.`;
  }
  return `De prestatieverhouding (PR ${pr.toFixed(1)}%) is ongewoon hoog. Controleer of de productiewaarde, hellingshoek en het systeemvermogen correct zijn ingevoerd.`;
}

// ── Main analysis function (fully local, no API calls needed for data) ─────────
async function analyzeLocal(place, kwp, periodChoice, kwhProduced, orientation, tilt, systemAge, sys2) {
  const period = getPeriodDates(periodChoice);
  const orientInfo = ORIENTATION_FACTORS[orientation] || ORIENTATION_FACTORS["Z"];
  const tiltDeg = parseInt(tilt) || 35;
  const tiltFactor = getTiltFactor(orientation, tiltDeg);

  // 1. Geocode the place
  const coords = await geocodePlace(place);
  let station, distanceKm;
  if (coords) {
    const nearest = findNearestStation(coords.lat, coords.lon, period.start, period.end);
    station = nearest.station;
    distanceKm = nearest.dist.toFixed(1);
  } else {
    // Fallback: pick station by name match or nearest with data
    station = KNMI_STATIONS.find(s => s.name.toLowerCase().includes(place.toLowerCase()))
           || KNMI_STATIONS.find(s => KNMI_DATA[s.id])
           || KNMI_STATIONS.find(s => s.id === 260);
    distanceKm = "?";
  }

  // 2. Sum radiation for period
  const {totalQ, count, available} = sumRadiation(station.id, period.start, period.end);
  if (!available) {
    // Try nearest station with data as fallback
    const allWithDist = KNMI_STATIONS
      .filter(s => s.id !== station.id)
      .map(s => ({ s, available: sumRadiation(s.id, period.start, period.end) }))
      .filter(x => x.available.available);
    if (allWithDist.length === 0) throw new Error(`Geen stralingsdata beschikbaar voor de periode ${period.label}. De dataset loopt van 1 jan 2025 t/m 1 mrt 2026.`);
    const fallbackStation = coords
      ? allWithDist.sort((a,b) => haversine(coords.lat,coords.lon,a.s.lat,a.s.lon) - haversine(coords.lat,coords.lon,b.s.lat,b.s.lon))[0]
      : allWithDist.find(x => x.s.id === 260) || allWithDist[0];
    return buildResult(place, kwp, kwhProduced, orientation, tiltDeg, orientInfo, tiltFactor,
      fallbackStation.available, {...fallbackStation.s, name: fallbackStation.s.name + " (dichtstbijzijnde met data)"}, distanceKm, period, systemAge);
  }

  // Build system 1 result
  const result1 = buildResult(place, kwp, kwhProduced, orientation, tiltDeg, orientInfo, tiltFactor,
    {totalQ, count}, station, distanceKm, period, systemAge);

  // If no second system, return as-is
  if (!sys2) return result1;

  // Build system 2 theoretical result (same station/period)
  const orientInfo2 = ORIENTATION_FACTORS[sys2.orientation] || ORIENTATION_FACTORS["Z"];
  const tiltDeg2 = parseInt(sys2.tilt) || 35;
  const tiltFactor2 = getTiltFactor(sys2.orientation, tiltDeg2);
  const irradTilted2 = (totalQ / 360) * tiltFactor2;
  const theoretical2 = irradTilted2 * sys2.kwp;

  // Split total actual kWh proportionally based on theoretical yield per system
  const combinedTheoretical = parseFloat(result1.theoreticalYield) + theoretical2;
  const share1 = parseFloat(result1.theoreticalYield) / combinedTheoretical;
  const share2 = theoretical2 / combinedTheoretical;
  const kwh1 = Math.round(kwhProduced * share1 * 10) / 10;
  const kwh2 = Math.round(kwhProduced * share2 * 10) / 10;

  const result2 = buildResult(place, sys2.kwp, kwh2, sys2.orientation, tiltDeg2, orientInfo2, tiltFactor2,
    {totalQ, count}, station, distanceKm, period, sys2.age);
  // Rebuild result1 with its proportional share
  const result1final = buildResult(place, kwp, kwh1, orientation, tiltDeg, orientInfo, tiltFactor,
    {totalQ, count}, station, distanceKm, period, systemAge);

  // Combined PR: total actual / total theoretical
  const combinedPR = (kwhProduced / combinedTheoretical) * 100;
  const {rating, ratingIcon, ratingColor} = getRating(combinedPR);
  const combinedAdvice = getAdvice(combinedPR, "gecombineerd", Math.round((tiltDeg + tiltDeg2) / 2), Math.round((systemAge + (sys2.age||0)) / 2));

  return {
    ...result1final,
    // Override with combined totals
    kwp: kwp + sys2.kwp,
    kwhProduced: kwhProduced,
    theoreticalYield: Math.round(combinedTheoretical),
    performanceRatio: combinedPR.toFixed(1),
    rating, ratingIcon, ratingColor,
    advice: combinedAdvice,
    // System labels for display
    orientLabel: `Systeem 1: ${result1.orientArrow} ${result1.orientLabel} ${tiltDeg}° / Systeem 2: ${orientInfo2.arrow} ${orientInfo2.label} ${tiltDeg2}°`,
    orientArrow: null,
    tiltFactor: `${result1.tiltFactor} / ${result2.tiltFactor}`,
    // Per-system breakdown for ResultCard
    systems: [
      { label: "Systeem 1", ...result1final },
      { label: "Systeem 2", ...result2 },
    ],
  };
}

function buildResult(place, kwp, kwhProduced, orientation, tiltDeg, orientInfo, tiltFactor,
  {totalQ, count}, station, distanceKm, period, systemAge) {
  // Convert horizontal KNMI irradiance to tilted-plane irradiance (SMA method)
  const irradianceHorizKwhM2 = totalQ / 360;
  const irradianceTiltedKwhM2 = irradianceHorizKwhM2 * tiltFactor;
  // PR = actual / (tilted irradiance × kWp) — the kWp already encodes module efficiency
  const theoreticalYield = irradianceTiltedKwhM2 * kwp;
  const pr = (kwhProduced / theoreticalYield) * 100;
  const {rating, ratingIcon, ratingColor} = getRating(pr);
  const advice = getAdvice(pr, orientInfo.label, tiltDeg, systemAge || 0);

  return {
    place, kwp, kwhProduced, orientation, tilt: tiltDeg, systemAge: systemAge || 0,
    orientLabel: orientInfo.label, orientArrow: orientInfo.arrow, tiltFactor: tiltFactor.toFixed(2),
    station: station.name, stationId: station.id, distanceKm,
    irradianceHorizKwhM2: irradianceHorizKwhM2.toFixed(1),
    irradianceTiltedKwhM2: irradianceTiltedKwhM2.toFixed(1),
    daysWithData: count,
    theoreticalYield: Math.round(theoreticalYield),
    performanceRatio: pr.toFixed(1),
    rating, ratingIcon, ratingColor, advice,
    periodLabel: period.label
  };
}

// ── KwpInput: single or dual-roof kWp entry ───────────────────────────────────
function KwpInput({ onSubmit }) {
  const [dual, setDual] = React.useState(false);
  const [valA, setValA] = React.useState("");
  const [valB, setValB] = React.useState("");
  const [val,  setVal]  = React.useState("");
  const refA = React.useRef(null);
  const refS = React.useRef(null);

  React.useEffect(()=>{
    if (dual) setTimeout(()=>refA.current?.focus(), 50);
    else setTimeout(()=>refS.current?.focus(), 50);
  }, [dual]);

  function submit() {
    if (dual) {
      const a = parseFloat(valA), b = parseFloat(valB);
      if (!a || !b || a<=0 || b<=0) return;
      onSubmit(a + "+" + b);
    } else {
      const v = parseFloat(val);
      if (!v || v<=0) return;
      onSubmit(String(v));
    }
  }

  const inp = {
    background:"#fff", border:"1px solid #d0d5dd", borderRadius:"8px",
    padding:"13px 16px", color:"#1a2332", fontSize:"15px",
    outline:"none", fontFamily:"inherit", width:"100%",
  };
  const lbl = { fontSize:"11px", color:"#8a9ab0", letterSpacing:"1px",
    textTransform:"uppercase", marginBottom:"4px", display:"block" };

  return (
    <div>
      {!dual ? (
        <div style={{display:"flex",gap:"8px"}}>
          <input ref={refS} type="number" value={val} onChange={e=>setVal(e.target.value)}
            placeholder="bijv. 6.5" style={{flex:1,...inp}}
            onKeyDown={e=>{ if(e.key==="Enter"&&val) submit(); }} />
          <button onClick={submit} style={{background:"#EDB800",border:"none",borderRadius:"12px",
            padding:"13px 20px",cursor:"pointer",fontSize:"17px",color:"#0a0e1a"}}>→</button>
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
          <div style={{display:"flex",gap:"8px"}}>
            <div style={{flex:1}}>
              <span style={lbl}>Dakvlak 1</span>
              <input ref={refA} type="number" value={valA} onChange={e=>setValA(e.target.value)}
                placeholder="bijv. 4.0" style={inp}
                onKeyDown={e=>{ if(e.key==="Enter") submit(); }} />
            </div>
            <div style={{flex:1}}>
              <span style={lbl}>Dakvlak 2</span>
              <input type="number" value={valB} onChange={e=>setValB(e.target.value)}
                placeholder="bijv. 2.5" style={inp}
                onKeyDown={e=>{ if(e.key==="Enter") submit(); }} />
            </div>
            <button onClick={submit} style={{background:"#EDB800",border:"none",borderRadius:"12px",
              padding:"13px 20px",cursor:"pointer",fontSize:"17px",color:"#0a0e1a",alignSelf:"flex-end"}}>→</button>
          </div>
        </div>
      )}
      <button onClick={()=>setDual(!dual)}
        style={{marginTop:"8px",background:"none",border:"none",cursor:"pointer",
          fontSize:"12px",color:"#EDB800",fontWeight:"600",padding:"2px 0",
          textDecoration:"underline",textDecorationStyle:"dotted"}}>
        {dual ? "← Één dakvlak" : "+ Twee dakvlakken (oost/west of split)"}
      </button>
    </div>
  );
}

function EmailSignup({ result }) {
  const [phase, setPhase] = useState("button");   // button | form | generating | done
  const [email, setEmail] = useState("");
  const [marketingOk, setMarketingOk] = useState(true);
  const [error, setError] = useState("");

  // ── Google Sheets webhook — fill in your Apps Script URL here ──────────────
  const SHEET_WEBHOOK = "";  // e.g. "https://script.google.com/macros/s/ABC.../exec"

  async function handleSubmit() {
    if (!email.includes("@")) { setError("Vul een geldig e-mailadres in."); return; }
    setError("");
    setPhase("generating");

    // Post to Google Sheets if webhook is configured
    if (SHEET_WEBHOOK) {
      try {
        await fetch(SHEET_WEBHOOK, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email, marketingOk,
            plaats: result.place,
            kwp: result.kwp,
            orientatie: result.orientLabel,
            pr: result.performanceRatio,
            periode: result.periodLabel,
            datum: new Date().toISOString(),
          }),
        });
      } catch(e) { /* fail silently — still generate PDF */ }
    }

    // Generate PDF
    generatePDF(result, email);
    setPhase("done");
  }

  function generatePDF(r, emailAddr) {
    // ── jsPDF helpers ─────────────────────────────────────────────────────────
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "mm", format: "a4" });
    const W = 210, M = 18, CW = W - M * 2;
    let y = 0;

    // Colours
    const YELLOW = [237, 184, 0];
    const DARK   = [26, 35, 50];
    const GREY   = [90, 106, 122];
    const LIGHT  = [240, 242, 245];
    const RED    = [229, 57, 53];
    const GREEN  = [67, 160, 71];
    const ratingRgb = r.ratingColor === "#e53935" ? RED
                    : r.ratingColor === "#43a047" || r.ratingColor === "#00897b" ? GREEN
                    : [251, 140, 0];

    function hex2rgb(hex) {
      const h = hex.replace("#","");
      return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
    }

    function setFont(style="normal", size=10, color=DARK) {
      doc.setFont("helvetica", style);
      doc.setFontSize(size);
      doc.setTextColor(...color);
    }

    function drawRect(x, yy, w, h, color, radius=2) {
      doc.setFillColor(...color);
      doc.roundedRect(x, yy, w, h, radius, radius, "F");
    }

    function line(yy, color=LIGHT) {
      doc.setDrawColor(...color);
      doc.setLineWidth(0.3);
      doc.line(M, yy, W-M, yy);
    }

    function checkPage(needed=20) {
      if (y + needed > 270) { doc.addPage(); y = 20; }
    }

    // ── HEADER ────────────────────────────────────────────────────────────────
    drawRect(0, 0, W, 38, DARK, 0);
    doc.setFillColor(...YELLOW);
    doc.rect(0, 0, 4, 38, "F");
    setFont("bold", 18, YELLOW);
    doc.text("ZONHUB | SolarCheck", M, 15);
    setFont("normal", 9, [180, 190, 200]);
    doc.text("Zonnepaneel Prestatie Rapport", M, 22);
    setFont("normal", 8, [140, 155, 170]);
    doc.text(`Gegenereerd op ${new Date().toLocaleDateString("nl-NL", {day:"numeric",month:"long",year:"numeric"})}  ·  ${emailAddr}`, M, 30);
    y = 48;

    // ── PR SCORE BLOCK ────────────────────────────────────────────────────────
    drawRect(M, y, CW, 32, LIGHT, 3);
    // PR percentage — large, left side
    setFont("bold", 30, hex2rgb(r.ratingColor));
    doc.text(r.performanceRatio + "%", M+5, y+22);
    // Vertical divider
    doc.setDrawColor(220, 225, 230);
    doc.setLineWidth(0.3);
    doc.line(M+48, y+4, M+48, y+28);
    // Right side labels
    setFont("normal", 7, GREY);
    doc.text("PERFORMANCE RATIO", M+52, y+9);
    setFont("bold", 12, DARK);
    doc.text(r.rating, M+52, y+17);
    setFont("normal", 8, GREY);
    doc.text(r.periodLabel + "  |  " + r.place, M+52, y+23);
    doc.text("Station: " + r.station + (r.distanceKm ? " (" + r.distanceKm + " km)" : ""), M+52, y+29);
    y += 40;

    // ── SYSTEM DETAILS TABLE ──────────────────────────────────────────────────
    setFont("bold", 10, DARK);
    doc.text("Systeemgegevens", M, y); y += 6;
    line(y); y += 4;

    const rows = [
      ["Vermogen", `${r.kwp} kWp`],
      ["Oriëntatie", r.orientArrow ? `${r.orientArrow} ${r.orientLabel}` : r.orientLabel],
      ["Hellingshoek", `${r.tilt}°  (tiltfactor ${r.tiltFactor})`],
      ["Systeemleeftijd", r.systemAge === 0 ? "Nieuw (< 1 jaar)" : `~${r.systemAge} jaar`],
      ["Instraling horizontaal", `${r.irradianceHorizKwhM2} kWh/m²`],
      ["Instraling op paneel", `${r.irradianceTiltedKwhM2} kWh/m²  (${r.daysWithData} dagen)`],
      ["Theoretische opbrengst", `${r.theoreticalYield} kWh`],
      ["Werkelijke productie", `${r.kwhProduced} kWh`],
    ];
    rows.forEach(([label, val], i) => {
      if (i % 2 === 0) drawRect(M, y-3, CW, 7, [247,248,250], 1);
      setFont("normal", 9, GREY);
      doc.text(label, M+3, y+2);
      setFont("bold", 9, DARK);
      doc.text(val, M+80, y+2);
      y += 7;
    });
    y += 6;

    // ── WHAT IS PR ────────────────────────────────────────────────────────────
    checkPage(50);
    drawRect(M, y, CW, 6, YELLOW, 2);
    setFont("bold", 10, DARK);
    doc.text("Wat is de Performance Ratio?", M+3, y+4.5); y += 10;

    setFont("normal", 9, DARK);
    const prExplain = doc.splitTextToSize(
      "De Performance Ratio (PR) vergelijkt de werkelijke stroomopbrengst van je zonnepanelen met de theoretisch maximale opbrengst op basis van de gemeten zonnestraling op jouw locatie. Een PR van 80% betekent dat je systeem 80% presteert van wat theoretisch mogelijk is onder de gemeten omstandigheden.",
      CW);
    doc.text(prExplain, M, y); y += prExplain.length * 5 + 3;

    setFont("normal", 9, DARK);
    const formula = "Formule:  PR = Werkelijke productie (kWh)  ÷  (Instraling op paneel (kWh/m²)  ×  Vermogen (kWp))";
    drawRect(M, y, CW, 9, [230, 240, 255], 2);
    setFont("bold", 9, [30, 80, 180]);
    doc.text(formula, M+3, y+6); y += 15;

    setFont("bold", 9, DARK);
    doc.text("Referentiewaarden (SMA-norm):", M, y); y += 5;
    const refs = [
      ["< 75%",    "(!!) Lager dan verwacht — inspectie aanbevolen",   RED],
      ["75–80%",  "(~)  Onder gemiddeld — mogelijke verbeterpunten",  [251,140,0]],
      ["80–90%",  "(v)  Goed — normaal voor een goed functionerend systeem",  GREEN],
      ["90–95%",  "(**)  Zeer goed",                                   [0,137,123]],
      ["> 95%",   "(!!) Ongewoon hoog — controleer invoer",           [142,36,170]],
    ];
    refs.forEach(([range, label, col]) => {
      checkPage(8);
      setFont("bold", 8, col);
      doc.text(range, M+3, y);
      setFont("normal", 8, DARK);
      doc.text(label, M+22, y);
      y += 5.5;
    });
    y += 4;

    // ── INTERPRETATION ────────────────────────────────────────────────────────
    checkPage(60);
    drawRect(M, y, CW, 6, YELLOW, 2);
    setFont("bold", 10, DARK);
    doc.text("Hoe interpreteer je de uitkomst?", M+3, y+4.5); y += 10;

    const interp = [
      ["Schaduwwerking", "Schaduw is de meest voorkomende oorzaak van een lage PR. Zelfs gedeeltelijke schaduw van een schoorsteen, boom of dakkapel op één paneel kan de output van een hele string verlagen. Controleer vooral in de ochtend en avond of vroege voorjaar/late herfst of er sprake is van schaduwval op de panelen."],
      ["Vervuiling & vogelpoep", "Vuil op de panelen verlaagt de lichtopvang. Bij een hellingshoek onder 15° spoelt regen minder effectief schoon. Overweeg jaarlijks professioneel reinigen."],
      ["Temperatuureffect", "Zonnepanelen presteren beter bij lagere temperaturen. Warme zomerdagen verlagen tijdelijk de PR — dit is normaal en geen teken van een defect."],
      ["Omvormer", "Een haperende omvormer is vaak de oorzaak van een plotse PR-daling. Controleer de omvormer-app of het display op foutmeldingen."],
      ["Panelveroudering", r.systemAge >= 5 ? `Bij een systeem van ~${r.systemAge} jaar is een degradatie van ~${Math.min(r.systemAge*0.5,20).toFixed(0)}% normaal (industriestandaard ~0.5%/jaar voor mono- en polykristallijn). Dit is verdisconteerd in de beoordeling.` : "Nieuwe systemen presteren doorgaans het best. Degradatie neemt geleidelijk toe (~0.5%/jaar)."],
    ];

    interp.forEach(([title, text]) => {
      checkPage(25);
      setFont("bold", 9, DARK);
      doc.text("- " + title, M, y); y += 5;
      setFont("normal", 9, GREY);
      const wrapped = doc.splitTextToSize(text, CW-5);
      doc.text(wrapped, M+4, y); y += wrapped.length * 4.8 + 4;
    });
    y += 2;

    // ── HOW TO IMPROVE ────────────────────────────────────────────────────────
    checkPage(55);
    drawRect(M, y, CW, 6, YELLOW, 2);
    setFont("bold", 10, DARK);
    doc.text("Hoe verbeter je de PR?", M+3, y+4.5); y += 10;

    const improvements = [
      ["Schaduw reduceren", "Snoeien of verwijderen van bomen/struiken die schaduw werpen. Overweeg micro-omvormers of optimizers als schaduw niet volledig te vermijden is — deze beperken het cascade-effect op de rest van de string."],
      ["Panelen reinigen", "Professioneel reinigen kan de opbrengst met 3–5% verhogen, vooral bij een lage hellingshoek of in stedelijk/agrarisch gebied."],
      ["Omvormer controleren", "Laat de omvormer jaarlijks controleren door een installateur. Een onderpresterende omvormer is relatief goedkoop te vervangen en heeft direct effect op de PR."],
      ["Hellingshoek optimaliseren", `De optimale hellingshoek op Nederlandse breedtegraad (~52°N) is 35–38°. Uw systeem staat op ${r.tilt}°.${Math.abs(r.tilt-36)>8 ? " Een aanpassing richting 35° kan de jaaropbrengst verbeteren." : " Dit is dicht bij optimaal."}`],
      ["Uitbreiden met optimizers", "Power-optimizers per paneel elimineren het effect van schaduw en vervuiling op de totale string en verhogen de PR typisch met 5–15% in niet-ideale situaties."],
    ];

    improvements.forEach(([title, text]) => {
      checkPage(25);
      setFont("bold", 9, DARK);
      doc.text("- " + title, M, y); y += 5;
      setFont("normal", 9, GREY);
      const wrapped = doc.splitTextToSize(text, CW-5);
      doc.text(wrapped, M+4, y); y += wrapped.length * 4.8 + 4;
    });
    y += 2;

    // ── DISCLAIMER ────────────────────────────────────────────────────────────
    checkPage(35);
    drawRect(M, y, CW, 6, [240,240,240], 2);
    setFont("bold", 9, GREY);
    doc.text("Disclaimer", M+3, y+4.5); y += 10;
    setFont("normal", 8, GREY);
    const disclaimer = doc.splitTextToSize(
      "Dit rapport is gegenereerd op basis van schattingen en historische KNMI-stralingsgegevens. De berekende Performance Ratio is een indicatie en geen gecertificeerde meting. Stralingsdata is afkomstig van het dichtstbijzijnde KNMI-weerstation en kan afwijken van de werkelijke instraling op uw locatie door lokale factoren zoals bewolking, horizonafscherming en microklimaat. De tiltfactor is berekend op basis van een vereenvoudigd model (SMA-methode) en houdt geen rekening met reflectie, diffuse straling of albedo. Raadpleeg een gecertificeerde installateur voor een professionele prestatiemeting. Zonhub aanvaardt geen aansprakelijkheid voor beslissingen genomen op basis van dit rapport.",
      CW);
    doc.text(disclaimer, M, y); y += disclaimer.length * 4.5 + 6;

    // ── FOOTER ────────────────────────────────────────────────────────────────
    const pageCount = doc.getNumberOfPages();
    for (let p = 1; p <= pageCount; p++) {
      doc.setPage(p);
      drawRect(0, 287, W, 10, DARK, 0);
      setFont("normal", 7, [140,155,170]);
      doc.text("ZONHUB | SolarCheck  ·  zonhub.com/check  ·  Zonnepaneel Prestatie Analyse", M, 293);
      doc.text(`Pagina ${p} van ${pageCount}`, W-M, 293, {align:"right"});
    }

    doc.save(`SolarCheck_Rapport_${r.place.replace(/\s+/g,"_")}_${new Date().toISOString().slice(0,10)}.pdf`);
  }

  // ── RENDER ─────────────────────────────────────────────────────────────────
  if (phase === "button") return (
    <button onClick={()=>setPhase("form")}
      style={{ background:"#1a2332", color:"#EDB800", border:"none",
        padding:"12px 24px", borderRadius:"30px", cursor:"pointer",
        fontSize:"13px", fontFamily:"inherit", fontWeight:"700",
        letterSpacing:"0.5px", display:"flex", alignItems:"center", gap:"8px",
        boxShadow:"0 2px 8px rgba(0,0,0,0.15)" }}>
      ↓ Download uitgebreid rapport (PDF)
    </button>
  );

  if (phase === "generating") return (
    <div style={{ textAlign:"center", padding:"16px", color:"#5a6a7a", fontSize:"13px" }}>
      <div style={{ fontSize:"24px", marginBottom:"8px" }}>📄</div>
      PDF wordt gegenereerd…
    </div>
  );

  if (phase === "done") return (
    <div style={{ textAlign:"center", padding:"16px" }}>
      <div style={{ fontSize:"28px", marginBottom:"8px" }}>✅</div>
      <div style={{ fontWeight:"700", fontSize:"14px", color:"#1a2332", marginBottom:"6px" }}>
        Rapport gedownload!
      </div>
      <div style={{ fontSize:"12px", color:"#5a6a7a" }}>
        Check je downloads map voor het PDF-rapport.
      </div>
    </div>
  );

  // phase === "form"
  return (
    <div style={{ background:"#fff", border:"1px solid #e8eaed", borderRadius:"16px",
      padding:"22px", maxWidth:"400px", boxShadow:"0 4px 20px rgba(0,0,0,0.08)" }}>
      <div style={{ fontWeight:"800", fontSize:"15px", color:"#1a2332", marginBottom:"4px" }}>
        ↓ Download uitgebreid rapport
      </div>
      <div style={{ fontSize:"12px", color:"#5a6a7a", marginBottom:"18px", lineHeight:"1.5" }}>
        Vul je e-mailadres in om het PDF-rapport te downloaden. Het rapport bevat een uitleg
        van de berekening, interpretatie van je score, tips voor verbetering en een disclaimer.
      </div>

      <label style={{ display:"block", fontSize:"11px", fontWeight:"700",
        color:"#1a2332", marginBottom:"5px", letterSpacing:"0.5px" }}>E-MAILADRES</label>
      <input type="email" value={email} onChange={e=>{ setEmail(e.target.value); setError(""); }}
        onKeyDown={e=>e.key==="Enter" && handleSubmit()}
        placeholder="jouw@emailadres.nl" autoFocus
        style={{ width:"100%", padding:"11px 14px", borderRadius:"8px",
          border:`1.5px solid ${error ? "#e53935" : "#e8eaed"}`,
          fontSize:"14px", fontFamily:"inherit", outline:"none",
          boxSizing:"border-box", marginBottom: error ? "4px" : "14px" }}/>
      {error && <div style={{ fontSize:"11px", color:"#e53935", marginBottom:"10px" }}>{error}</div>}

      <label style={{ display:"flex", gap:"10px", alignItems:"flex-start",
        cursor:"pointer", marginBottom:"18px" }}
        onClick={()=>setMarketingOk(v=>!v)}>
        <input type="checkbox" checked={marketingOk} readOnly
          style={{ marginTop:"3px", accentColor:"#EDB800", flexShrink:0 }}/>
        <span style={{ fontSize:"11px", color:"#5a6a7a", lineHeight:"1.5" }}>
          Ja, ik wil nieuws en aanbiedingen van Zonhub ontvangen. (optioneel — vink uit om af te melden)
        </span>
      </label>

      <button onClick={handleSubmit}
        style={{ width:"100%", background:"#EDB800", color:"#1a2332",
          border:"none", borderRadius:"8px", padding:"13px",
          fontSize:"14px", fontWeight:"700", cursor:"pointer",
          fontFamily:"inherit" }}>
        Rapport downloaden
      </button>
      <p style={{ fontSize:"11px", color:"#b0bec5", marginTop:"10px", textAlign:"center" }}>
        Zonhub verwerkt je gegevens conform de AVG. Geen spam, geen doorverkoop.
      </p>
    </div>
  );
}


function ShareButton({ result }) {
  const [open, setOpen] = useState(false);
  return (
    <>
      <button onClick={()=>setOpen(true)}
        style={{ background:"#1a2332", color:"#EDB800", border:"none",
          padding:"11px 22px", borderRadius:"30px", cursor:"pointer",
          fontSize:"13px", fontFamily:"inherit", letterSpacing:"1px",
          display:"flex", alignItems:"center", gap:"8px",
          boxShadow:"0 2px 12px rgba(26,35,50,0.2)" }}>
        <span style={{fontSize:"15px"}}>↗</span> Deel resultaat
      </button>
      {open && <ShareModal result={result} onClose={()=>setOpen(false)}/>}
    </>
  );
}

function ShareModal({ result, onClose }) {
  const canvasRef = useRef(null);
  const [copied, setCopied] = useState(false);
  const [imgUrl, setImgUrl] = useState(null);
  const pr = parseFloat(result.performanceRatio);

  // Rating colors
  const ratingColor = result.ratingColor;

  // Draw share card on canvas
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const W = 1200, H = 630;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext("2d");

    // Achtergrond: wit Zonhub-branding
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, W, H);
    const glow = ctx.createRadialGradient(W*0.88, H*0.1, 0, W*0.88, H*0.1, 440);
    glow.addColorStop(0, "rgba(237,184,0,0.08)");
    glow.addColorStop(1, "transparent");
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#f7f8fa";
    ctx.fillRect(0, 0, 568, H);
    ctx.fillStyle = "#EDB800";
    ctx.fillRect(0, 0, 5, H);
    ctx.font = "bold 27px Arial";
    ctx.fillStyle = "#1a2332";
    ctx.fillText("ZONHUB", 36, 56);
    ctx.fillStyle = "#EDB800";
    ctx.fillText(" | SolarCheck", 136, 56);
    ctx.fillStyle = "#e8eaed";
    ctx.fillRect(36, 70, 498, 1);
    ctx.font = "bold 138px Arial";
    ctx.fillStyle = ratingColor;
    ctx.fillText(pr.toFixed(1) + "%", 36, 292);
    ctx.font = "bold 17px Arial";
    ctx.fillStyle = "#8a9ab0";
    ctx.fillText("PERFORMANCE RATIO", 40, 328);
    const badgeW = 228, badgeH = 46, badgeX = 38, badgeY = 352;
    ctx.fillStyle = ratingColor + "18";
    ctx.strokeStyle = ratingColor + "55";
    ctx.lineWidth = 1.5;
    roundRect(ctx, badgeX, badgeY, badgeW, badgeH, 23);
    ctx.fill(); ctx.stroke();
    ctx.font = "bold 20px Arial";
    ctx.fillStyle = ratingColor;
    ctx.fillText(result.ratingIcon + "  " + result.rating, badgeX + 18, badgeY + 30);
    const barX = 38, barY = 438, barW2 = 488, barH2 = 12, MAX = 110;
    ctx.fillStyle = "#e8eaed";
    roundRect(ctx, barX, barY, barW2, barH2, 6); ctx.fill();
    const fillW = Math.min(pr, MAX) / MAX * barW2;
    const grad = ctx.createLinearGradient(barX, 0, barX + barW2, 0);
    grad.addColorStop(0,    "#e53935");
    grad.addColorStop(0.62, "#fb8c00");
    grad.addColorStop(0.67, "#43a047");
    grad.addColorStop(0.82, "#00897b");
    grad.addColorStop(0.90, "#1565c0");
    ctx.fillStyle = grad;
    roundRect(ctx, barX, barY, fillW, barH2, 6); ctx.fill();
    [75,80,90,95,100].forEach(p => {
      ctx.fillStyle = "rgba(255,255,255,0.75)";
      ctx.fillRect(barX + (p/MAX)*barW2, barY, 1.5, barH2);
    });
    ctx.font = "12px Arial"; ctx.fillStyle = "#b0bec5";
    [0,75,80,90,95,100].forEach(p => {
      const mx = barX + (p/MAX)*barW2;
      ctx.fillText(p + "%", mx - (p > 0 ? 10 : 0), barY + barH2 + 18);
    });
    ctx.fillStyle = "#e8eaed";
    ctx.fillRect(578, 86, 1.5, H - 136);
    const rx = 616;
    const details = [
      ["Locatie",           result.place],
      ["Systeemvermogen",   result.kwp + " kWp"],
      ["Orientatie",        result.orientArrow + " " + result.orientLabel + " - " + result.tilt + "deg"],
      ["KNMI-station",      result.station],
      ["Instraling paneel", result.irradianceTiltedKwhM2 + " kWh/m2"],
      ["Werkelijk",         result.kwhProduced + " kWh"],
      ["Theoretisch",       result.theoreticalYield + " kWh"],
      ["Periode",           result.periodLabel],
    ];
    ctx.font = "bold 27px Arial"; ctx.fillStyle = "#1a2332";
    ctx.fillText("Systeemanalyse", rx, 134);
    ctx.fillStyle = "#e8eaed";
    ctx.fillRect(rx, 148, 532, 1.5);
    details.forEach(([label, val], i) => {
      const y = 190 + i * 52;
      ctx.font = "12px Arial"; ctx.fillStyle = "#8a9ab0";
      ctx.fillText(label.toUpperCase(), rx, y);
      ctx.font = "bold 17px Arial"; ctx.fillStyle = "#1a2332";
      ctx.fillText(val, rx, y + 22);
    });
    ctx.fillStyle = "#f0f2f5";
    ctx.fillRect(0, H - 50, W, 50);
    ctx.fillStyle = "#EDB800";
    ctx.fillRect(0, H - 50, W, 2);
    ctx.font = "13px Arial"; ctx.fillStyle = "#b0bec5";
    ctx.fillText("Berekend met officiele KNMI-stralingsgegevens  -  zonhub.com/solarcheck", 36, H - 17);

    setImgUrl(canvas.toDataURL("image/png"));
  }, []);

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
  }

  function downloadImage() {
    const a = document.createElement("a");
    a.href = imgUrl;
    a.download = `solarcheck-${result.place.replace(/\s+/g,"-").toLowerCase()}.png`;
    a.click();
  }

  function copyText() {
    const pr = parseFloat(result.performanceRatio);
    const text =
`☀️ SolarCheck — Zonnepaneel analyse

📍 ${result.place} · ${result.kwp} kWp · ${result.orientArrow} ${result.orientLabel} ${result.tilt}°
📅 ${result.periodLabel}

Performance Ratio: ${result.performanceRatio}% — ${result.rating} ${result.ratingIcon}

⚡ Theoretisch: ${result.theoreticalYield} kWh
🔌 Werkelijk:   ${result.kwhProduced} kWh
☀️ Instraling:  ${result.irradianceTiltedKwhM2} kWh/m²

Bereken zelf: zonhub.com/solarcheck`;
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    });
  }

  const canShare = typeof navigator.share === "function";

  function nativeShare() {
    navigator.share({
      title: "SolarCheck — mijn zonnepanelen analyse",
      text: `Mijn zonnepanelen scoren ${result.performanceRatio}% PR (${result.rating}). Bereken die van jou: zonhub.com/solarcheck`,
    }).catch(()=>{});
  }

  return (
    <div style={{ position:"fixed",inset:0,background:"rgba(10,14,26,0.85)",
      zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",
      padding:"20px", backdropFilter:"blur(6px)" }}
      onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>

      <div style={{ background:"#ffffff",borderRadius:"20px",maxWidth:"560px",width:"100%",
        boxShadow:"0 24px 80px rgba(0,0,0,0.4)", overflow:"hidden" }}>

        {/* Header */}
        <div style={{ background:"#1a2332",padding:"20px 24px",display:"flex",
          alignItems:"center",justifyContent:"space-between" }}>
          <div>
            <div style={{ color:"#EDB800",fontWeight:"800",fontSize:"15px",letterSpacing:"-0.3px" }}>
              Deel jouw resultaat
            </div>
            <div style={{ color:"rgba(255,255,255,0.45)",fontSize:"12px",marginTop:"2px" }}>
              Laat anderen zien hoe jouw systeem presteert
            </div>
          </div>
          <button onClick={onClose} style={{ background:"rgba(255,255,255,0.1)",border:"none",
            color:"white",width:"32px",height:"32px",borderRadius:"50%",
            cursor:"pointer",fontSize:"16px" }}>×</button>
        </div>

        {/* Preview */}
        <div style={{ padding:"20px 24px 0" }}>
          <div style={{ fontSize:"11px",color:"#9aabb8",letterSpacing:"1px",
            textTransform:"uppercase",marginBottom:"10px" }}>Voorvertoning</div>
          {imgUrl
            ? <img src={imgUrl} alt="share card"
                style={{ width:"100%",borderRadius:"10px",
                  boxShadow:"0 4px 20px rgba(0,0,0,0.15)" }}/>
            : <div style={{ height:"220px",background:"#f0f2f5",borderRadius:"10px",
                display:"flex",alignItems:"center",justifyContent:"center",
                color:"#9aabb8",fontSize:"13px" }}>Kaart laden…</div>
          }
        </div>

        {/* Hidden canvas */}
        <canvas ref={canvasRef} style={{ display:"none" }}/>

        {/* Actions */}
        <div style={{ padding:"20px 24px 24px",display:"flex",flexDirection:"column",gap:"10px" }}>
          <button onClick={downloadImage} disabled={!imgUrl}
            style={{ background:"#EDB800",color:"#1a2332",border:"none",
              borderRadius:"10px",padding:"13px",fontSize:"14px",fontWeight:"700",
              cursor:"pointer",fontFamily:"inherit",
              display:"flex",alignItems:"center",justifyContent:"center",gap:"8px",
              opacity: imgUrl ? 1 : 0.5 }}>
            <span>⬇</span> Download afbeelding
          </button>

          <div style={{ display:"flex",gap:"8px" }}>
            <button onClick={copyText}
              style={{ flex:1,background:copied?"#f0faf4":"#f4f6f9",
                color:copied?"#2e7d32":"#1a2332",border:`1px solid ${copied?"#81c784":"#e8eaed"}`,
                borderRadius:"10px",padding:"11px",fontSize:"13px",fontWeight:"600",
                cursor:"pointer",fontFamily:"inherit",transition:"all 0.2s",
                display:"flex",alignItems:"center",justifyContent:"center",gap:"6px" }}>
              {copied ? "✓ Gekopieerd!" : "📋 Kopieer tekst"}
            </button>

            {canShare && (
              <button onClick={nativeShare}
                style={{ flex:1,background:"#f4f6f9",color:"#1a2332",
                  border:"1px solid #e8eaed",borderRadius:"10px",padding:"11px",
                  fontSize:"13px",fontWeight:"600",cursor:"pointer",fontFamily:"inherit",
                  display:"flex",alignItems:"center",justifyContent:"center",gap:"6px" }}>
                ↗ Delen via…
              </button>
            )}
          </div>

          <div style={{ fontSize:"11px",color:"#b0bec5",textAlign:"center",paddingTop:"4px" }}>
            De afbeelding bevat jouw locatie en systeemgegevens
          </div>
        </div>
      </div>
    </div>
  );
}

function Avatar() {
  return (
    <div style={{ width:"32px",height:"32px",flexShrink:0,
      background:"#fff",borderRadius:"50%",
      display:"flex",alignItems:"center",justifyContent:"center",

// Tiny roof SVG icon per tilt option
function RoofIcon({ deg, active }) {
  const W = 64, H = 50;
  const baseY = H - 6;
  const wallH = 16;
  const wallX = 6;
  // 0deg=horizontal(flat), 90deg=vertical
  const rad = deg * Math.PI / 180;
  const panelL = 34;
  const px0 = wallX + 18, py0 = baseY - wallH;
  // cos=horizontal reach (max at 0deg), sin=vertical rise (max at 90deg)
  const px1 = px0 + Math.cos(rad) * panelL;
  const py1 = py0 - Math.sin(rad) * panelL;
  const color = active ? "#1a2332" : "#9aabb8";
  const panelColor = active ? "#3a6bc4" : "#b0bec5";
  return (
    <svg width={W} height={H} viewBox={"0 0 " + W + " " + H} style={{display:"block"}}>
      <line x1="0" y1={baseY} x2={W} y2={baseY} stroke={color} strokeWidth="1.5" opacity="0.3"/>
      <rect x={wallX} y={baseY - wallH} width="18" height={wallH}
        fill={active ? "#e8eaed" : "#f0f2f5"} stroke={color} strokeWidth="1" opacity="0.7"/>
      <line x1={px0+1} y1={py0+1} x2={px1+1} y2={py1+1}
        stroke="rgba(0,0,0,0.07)" strokeWidth="4" strokeLinecap="round"/>
      <line x1={px0} y1={py0} x2={px1} y2={py1}
        stroke={active ? "#1a2332" : "#c0c8d0"} strokeWidth="4.5" strokeLinecap="round"/>
      <line x1={px0} y1={py0} x2={px1} y2={py1}
        stroke={panelColor} strokeWidth="3.5" strokeLinecap="round"/>
      {[0.35, 0.65].map(f => {
        const gx = px0 + Math.cos(rad)*panelL*f;
        const gy = py0 - Math.sin(rad)*panelL*f;
        const nx = -Math.sin(rad)*2, ny = Math.cos(rad)*2;
        return <line key={f} x1={gx-nx} y1={gy-ny} x2={gx+nx} y2={gy+ny}
          stroke="rgba(255,255,255,0.5)" strokeWidth="0.8"/>;
      })}
      {deg > 2 && (
        <path d={"M " + (px0+10) + " " + py0 + " A 10 10 0 0 0 " + (px0+Math.cos(rad)*10) + " " + (py0-Math.sin(rad)*10)}
          fill="none" stroke={active ? "#EDB800" : "#d0d5dd"} strokeWidth="1" strokeDasharray="2,1.5"/>
      )}
    </svg>
  );
}

function TiltSelector({ onSelect }) {
  const [hovered, setHovered] = useState(null);
  const OPTIONS = [
    { value:"0",  label:"0°",  sub:"Plat dak" },
    { value:"15", label:"15°", sub:"Licht hellend" },
    { value:"30", label:"30°", sub:"Normaal schuin" },
    { value:"40", label:"40°", sub:"Steil schuin" },
    { value:"50", label:"50°", sub:"Zeer steil" },
    { value:"60", label:"60°", sub:"Gevel" },
  ];
  return (
    <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:"8px" }}>
      {OPTIONS.map(opt => {
        const active = hovered === opt.value;
        return (
          <button key={opt.value}
            onClick={() => onSelect(opt.value)}
            onMouseEnter={() => setHovered(opt.value)}
            onMouseLeave={() => setHovered(null)}
            style={{
              background: active ? "rgba(237,184,0,0.1)" : "#fff",
              border: active ? "1.5px solid #EDB800" : "1.5px solid #e8eaed",
              borderRadius:"12px", padding:"10px 6px 8px",
              cursor:"pointer", display:"flex", flexDirection:"column",
              alignItems:"center", gap:"4px", transition:"all 0.15s"
            }}>
            <RoofIcon deg={parseInt(opt.value)} active={active}/>
            <span style={{ fontSize:"13px", fontWeight:"700",
              color: active ? "#1a2332" : "#2d3a48" }}>{opt.label}</span>
            <span style={{ fontSize:"10px", color: active ? "#5a6a7a" : "#9aabb8",
              textAlign:"center", lineHeight:"1.3" }}>{opt.sub}</span>
          </button>
        );
      })}
    </div>
  );
}


function CompassRose({ onSelect }) {
  const [hovered, setHovered] = useState(null);
  // Grid positions [row, col] in a 3x3 grid (0-indexed)
  const dirs = [
    { key:"NW", row:0, col:0 }, { key:"N",  row:0, col:1 }, { key:"NO", row:0, col:2 },
    { key:"W",  row:1, col:0 }, { key:null, row:1, col:1 }, { key:"O",  row:1, col:2 },
    { key:"ZW", row:2, col:0 }, { key:"Z",  row:2, col:1 }, { key:"ZO", row:2, col:2 },
  ];
  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,72px)", gap:"6px",
        justifyContent:"start" }}>
        {dirs.map(({ key, row, col }) => {
          if (!key) {
            // Center compass icon
            return (
              <div key="center" style={{ width:"72px", height:"72px",
                display:"flex", alignItems:"center", justifyContent:"center",
                fontSize:"28px", opacity:0.2 }}>🧭</div>
            );
          }
          const info = ORIENTATION_FACTORS[key];
          const isHot = hovered === key;
          // Highlight south-ish directions subtly
          const isFav = ["Z","ZW","ZO"].includes(key);
          return (
            <button key={key}
              onClick={() => onSelect(key)}
              onMouseEnter={() => setHovered(key)}
              onMouseLeave={() => setHovered(null)}
              style={{
                width:"72px", height:"72px",
                background: isHot
                  ? "rgba(237,184,0,0.15)"
                  : isFav
                    ? "rgba(237,184,0,0.05)"
                    : "rgba(255,255,255,0.04)",
                border: isHot
                  ? "1px solid #EDB800"
                  : isFav
                    ? "1px solid rgba(237,184,0,0.2)"
                    : "1px solid #e8eaed",
                borderRadius:"12px", cursor:"pointer",
                display:"flex", flexDirection:"column",
                alignItems:"center", justifyContent:"center", gap:"2px",
                transition:"all 0.15s"
              }}>
              <span style={{ fontSize:"22px", lineHeight:1,
                color: isHot ? "#1a2332" : "#2d3a48" }}>{info.arrow}</span>
              <span style={{ fontSize:"11px",
                color: isHot ? "#1a2332" : "#5a6a7a",
                fontFamily:"'Inter',Arial,sans-serif", letterSpacing:"0.3px" }}>{info.label}</span>
              <span style={{ fontSize:"9px",
                color: isHot ? "#EDB800" : "#9aabb8" }}>
                {["Z","ZW","ZO"].includes(key) ? "★" : ""}
              </span>
            </button>
          );
        })}
      </div>

    </div>
  );
}

function ResultCard({result}) {
  const pr = parseFloat(result.performanceRatio);
  // Bar scale: 0–110% maps to 0–100% width. Markers positioned proportionally.
  const BAR_MAX = 110;
  const fillPct = Math.min(pr, BAR_MAX) / BAR_MAX * 100;
  const markerPos = (v) => `${v / BAR_MAX * 100}%`;
  const rows = [
    ["📍 Locatie", result.place],
    ["📡 KNMI-station", result.distanceKm ? `${result.station} (${result.distanceKm} km)` : result.station],
    ["📅 Periode", result.periodLabel],
    ["🧭 Oriëntatie", result.orientArrow ? `${result.orientArrow} ${result.orientLabel}` : (result.orientLabel || "—")],
    ...(result.systems ? [] : [
      ["📐 Hellingshoek", `${result.tilt}° (tiltfactor ${result.tiltFactor})`],
      ["🗓 Systeemleeftijd", result.systemAge === 0 ? "Nieuw (< 1 jaar)" : `~${result.systemAge} jaar`],
      ["☀️ Instraling horizontaal", `${result.irradianceHorizKwhM2} kWh/m²`],
      ["☀️ Instraling op paneel", `${result.irradianceTiltedKwhM2} kWh/m²`],
    ]),
    ["⚡ Theoretische opbrengst", `${Math.round(result.theoreticalYield)} kWh`],
    ["🔌 Werkelijke productie", `${result.kwhProduced} kWh`],
  ];
  return (
    <div style={{ background:"#ffffff",border:`1px solid ${result.ratingColor}33`,
      borderRadius:"16px",padding:"20px",maxWidth:"500px",width:"100%",
      boxShadow:`0 2px 16px rgba(0,0,0,0.06), 0 0 0 1px ${result.ratingColor}22` }}>

      <div style={{ display:"flex",alignItems:"center",gap:"12px",marginBottom:"16px",
        paddingBottom:"13px",borderBottom:"1px solid #f0f2f5" }}>
        <span style={{ fontSize:"26px" }}>{result.ratingIcon}</span>
        <div>
          <div style={{ fontSize:"10px",color:"#8a9ab0",letterSpacing:"2px",
            textTransform:"uppercase",marginBottom:"2px" }}>Prestatie-oordeel</div>
          <div style={{ fontSize:"20px",fontWeight:"700",color:result.ratingColor }}>{result.rating}</div>
        </div>
        <div style={{ marginLeft:"auto",textAlign:"right" }}>
          <div style={{ fontSize:"30px",fontWeight:"700",color:result.ratingColor,lineHeight:1 }}>
            {Number(result.performanceRatio).toFixed(1)}%
          </div>
          <div style={{ fontSize:"10px",color:"#8a9ab0",letterSpacing:"1px",display:"flex",alignItems:"center",justifyContent:"flex-end",gap:"4px" }}>PR <PRInfoButton/></div>
        </div>
      </div>

      <div style={{ marginBottom:"16px" }}>
        <div style={{ height:"8px",background:"#f0f2f5",borderRadius:"4px",
          overflow:"hidden",position:"relative" }}>
          {[75,80,90,95,100].map(p=>(
            <div key={p} style={{ position:"absolute",left:markerPos(p),top:0,bottom:0,
              width:"1px",background:"rgba(255,255,255,0.7)",zIndex:1 }}/>
          ))}
          <div style={{ height:"100%",width:`${fillPct}%`,
            background:"linear-gradient(90deg,#e53935 0%,#fb8c00 62%,#43a047 67%,#00897b 77%,#1565c0 86%)",
            borderRadius:"4px",transition:"width 1s ease" }}/>
        </div>
        <div style={{ position:"relative",height:"18px",marginTop:"3px" }}>
          {[0,75,80,90,95].map(p=>(
            <span key={p} style={{
              position:"absolute", left:markerPos(p),
              transform: p===0 ? "none" : "translateX(-50%)",
              fontSize:"9px",
              color: Math.abs(pr-p) < 4 ? "#1a2332" : "#9aabb8",
              fontWeight: Math.abs(pr-p) < 4 ? "700" : "400",
              whiteSpace:"nowrap"
            }}>{p}%</span>
          ))}
          <span style={{ position:"absolute",right:0,fontSize:"9px",color:"#9aabb8",whiteSpace:"nowrap" }}>110%+</span>
          {pr >= 87 && (
            <span style={{
              position:"absolute",
              left:`${Math.min(pr, 108) / BAR_MAX * 100}%`,
              transform:"translateX(-50%)",
              fontSize:"10px", fontWeight:"800",
              color:result.ratingColor,
              top:"-2px",
              whiteSpace:"nowrap",
              background:"white",
              padding:"0 2px",
            }}>{Number(result.performanceRatio).toFixed(1)}%</span>
          )}
        </div>
      </div>

      {rows.map(([label,val])=>(
        <div key={label} style={{ display:"flex",justifyContent:"space-between",alignItems:"baseline",
          padding:"5px 0",borderBottom:"1px solid #f4f6f9",gap:"10px" }}>
          <span style={{ fontSize:"12px",color:"#8a9ab0",whiteSpace:"nowrap" }}>{label}</span>
          <span style={{ fontSize:"13px",color:"#2d3a48",textAlign:"right" }}>{val}</span>
        </div>
      ))}

      {result.systems && (
        <div style={{ marginBottom:"14px" }}>
          <div style={{ fontSize:"11px",color:"#8a9ab0",letterSpacing:"1.5px",
            textTransform:"uppercase",marginBottom:"8px" }}>Uitsplitsing per systeem</div>
          {result.systems.map((sys, idx) => (
            <div key={idx} style={{ background:"#f7f8fa", borderRadius:"10px",
              padding:"12px 14px", marginBottom:"8px",
              borderLeft:`3px solid ${idx===0?"#EDB800":"#3a6bc4"}` }}>
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px" }}>
                <span style={{ fontWeight:"700",fontSize:"13px",color:"#1a2332" }}>{sys.label}</span>
                <span style={{ fontWeight:"800",fontSize:"16px",color:sys.ratingColor }}>{sys.performanceRatio}%</span>
              </div>
              <div style={{ fontSize:"12px",color:"#5a6a7a",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"3px" }}>
                <span>{sys.orientArrow} {sys.orientLabel} · {sys.tilt}°</span>
                <span style={{textAlign:"right"}}>{sys.kwp} kWp</span>
                <span>Theoretisch: {Math.round(sys.theoreticalYield)} kWh</span>
                <span style={{textAlign:"right"}}>Werkelijk: {sys.kwhProduced} kWh</span>
              </div>
            </div>
          ))}
        </div>
      )}

      <div style={{ marginTop:"14px",padding:"11px 13px",background:`${result.ratingColor}11`,
        border:`1px solid ${result.ratingColor}33`,borderRadius:"10px",fontSize:"13px",
        color:"#2d3a48",lineHeight:"1.6",fontStyle:"italic" }}>
        {result.advice}
      </div>

      <div style={{ marginTop:"10px",fontSize:"10px",color:"#b0bec5",
        textAlign:"center",letterSpacing:"0.4px" }}>
        Berekend met KNMI dagelijkse stralingsgegevens · Instraling gecorrigeerd voor hellingshoek en oriëntatie
      </div>
    </div>
  );
}
